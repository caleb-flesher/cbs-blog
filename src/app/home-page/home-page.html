<h1>Home</h1>
@if (latestPost) {
  <a [routerLink]="['/blog', latestPost.attributes.slug]">
    Go to latest blog post: {{ latestPost.attributes.title }}
  </a>
}
@if (latestBikeBuild) {
  <a [routerLink]="['/bike-builds', latestBikeBuild.attributes.slug]">
    Go to latest bike build: {{ latestBikeBuild.attributes.title }}
  </a>
}

<app-back-button />
<div>
    <h1>Blog</h1>
    @for (post of sortedPosts; track post.attributes.slug) {
    <a [routerLink]="['/blog/', post.attributes.slug]">
        <div class="post__card">
        @if (post.attributes.coverImage) {
            <picture class="post__cover">
            <source [srcset]="post.attributes.coverImage + '?width=600&format=webp'" type="image/webp">
            <img [src]="post.attributes.coverImage + '?width=600'" [alt]="post.attributes.title + ' cover image'">
            </picture>
        }
        <div class="post__info">
            <h2 class="post__title">{{ post.attributes.title }}</h2>
            <p class="post__desc">{{ post.attributes.description }}</p>
        </div>
        </div>
    </a>
}
</div>
